<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#DC2626">
    <title>AR Game | Lucky Elephant Hunt</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        *{ box-sizing:border-box; }
        body { margin:0; padding:0; background:#000; overflow:hidden; height:100dvh; font-family:'Helvetica Neue',Arial,sans-serif; }

        /* AR layers */
        #ar-scene { position:fixed!important; inset:0!important; z-index:1!important; width:100%!important; height:100%!important; }
        #ar-scene video { position:fixed!important; inset:0!important; width:100%!important; height:100%!important; object-fit:cover!important; z-index:1!important; }
        #ar-scene canvas { position:fixed!important; inset:0!important; width:100%!important; height:100%!important; z-index:2!important; }

        /* Header */
        #hdr { position:fixed; top:0; left:0; right:0; z-index:60; background:#DC2626; color:#fff; padding:.7rem 1rem; display:flex; justify-content:space-between; align-items:center; }
        #hdr a { color:#fff; text-decoration:none; font-size:.75rem; background:rgba(255,255,255,.2); padding:.25rem .75rem; border-radius:999px; }

        /* HUD bar */
        #hud { position:fixed; top:52px; left:0; right:0; z-index:55; padding:0 .75rem; }
        #hud-inner { background:rgba(0,0,0,.65); border-radius:1rem; padding:.6rem .8rem; color:#fff; max-width:480px; margin:0 auto; }
        .item-dot { width:2.2rem; height:2.2rem; border-radius:50%; border:2.5px solid rgba(255,255,255,.5); background:rgba(255,255,255,.15); display:inline-flex; align-items:center; justify-content:center; font-size:1.1rem; transition:.3s; }
        .item-dot.collected { background:#DC2626; border-color:#fff; }

        /* Tap overlay — big red button, bottom of screen */
        #tap-overlay { position:fixed; bottom:7rem; left:0; right:0; z-index:30; text-align:center; display:none; }
        #tap-btn {
            background:#DC2626; color:#fff; border:none; border-radius:999px;
            font-size:1.1rem; font-weight:700; padding:1rem 2.5rem;
            cursor:pointer; box-shadow:0 4px 20px rgba(220,38,38,.6);
            animation:pulse-btn 1.5s ease-in-out infinite;
        }
        @keyframes pulse-btn {
            0%,100% { transform:scale(1); box-shadow:0 4px 20px rgba(220,38,38,.6); }
            50%      { transform:scale(1.05); box-shadow:0 6px 30px rgba(220,38,38,.9); }
        }

        /* Toast */
        #toast { position:fixed; bottom:5rem; left:50%; transform:translateX(-50%); z-index:70; background:#1a1a1a; color:#fff; padding:.6rem 1.2rem; border-radius:999px; font-size:.9rem; display:none; white-space:nowrap; }

        /* Full-screen overlays */
        .overlay { position:fixed; inset:0; z-index:80; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.5rem; text-align:center; }
        .btn-red  { background:#DC2626; color:#fff; border:none; border-radius:999px; font-size:1rem; font-weight:700; padding:1rem 2rem; cursor:pointer; width:100%; max-width:280px; margin-top:.75rem; }
        .btn-white{ background:#fff; color:#DC2626; border:2.5px solid #DC2626; border-radius:999px; font-size:1rem; font-weight:700; padding:.8rem 2rem; cursor:pointer; width:100%; max-width:280px; margin-top:.5rem; }
    </style>
</head>
<body>

<!-- Header -->
<div id="hdr">
    <span style="font-weight:700;font-size:.9rem;">🐘 AR Lucky Elephant Hunt</span>
    <a href="/demo.html">โหมดง่าย</a>
</div>

<!-- HUD -->
<div id="hud">
    <div id="hud-inner">
        <div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.4rem;">
            <span>ไอเทมนำโชค</span>
            <span id="item-count" style="font-weight:700;">0/3</span>
        </div>
        <div style="display:flex;gap:.5rem;justify-content:center;">
            <div class="item-dot">?</div>
            <div class="item-dot">?</div>
            <div class="item-dot">?</div>
        </div>
        <p id="scan-status" style="font-size:.75rem;text-align:center;margin:.4rem 0 0;opacity:.8;">ชี้กล้องไปที่การ์ด MindAR</p>
    </div>
</div>

<!-- Tap button (shows when target found) -->
<div id="tap-overlay">
    <button id="tap-btn">🐘 แตะช้าง! (0/3)</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Complete modal -->
<div id="complete-modal" style="position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:1rem;">
    <div style="background:#fff;border-radius:1.25rem;padding:1.75rem;max-width:320px;width:100%;text-align:center;">
        <div style="font-size:3rem;margin-bottom:.5rem;">🎉</div>
        <h2 style="color:#DC2626;font-size:1.3rem;margin-bottom:1rem;">ยินดีด้วย!</h2>
        <a href="/reward.html" style="display:block;background:#DC2626;color:#fff;padding:1rem;border-radius:999px;text-decoration:none;font-weight:700;">รับรางวัล</a>
    </div>
</div>

<!-- Start screen -->
<div id="start-screen" class="overlay" style="background:#DC2626;color:#fff;">
    <div style="font-size:4rem;margin-bottom:1rem;">📷</div>
    <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:.5rem;">เริ่มเกม AR</h2>
    <p style="font-size:.9rem;opacity:.9;max-width:260px;margin-bottom:1.5rem;">กดปุ่มด้านล่าง แล้วเลือก Allow เมื่อเบราว์เซอร์ถาม</p>
    <button id="start-ar-btn" class="btn-red">อนุญาตใช้กล้อง</button>
</div>

<!-- Loading screen -->
<div id="loading-screen" class="overlay" style="background:#DC2626;color:#fff;display:none;">
    <div style="font-size:3.5rem;margin-bottom:1rem;">🐘</div>
    <p id="loading-text" style="font-size:1.1rem;">กำลังเปิดกล้อง AR...</p>
</div>

<!-- Error screen -->
<div id="camera-error" class="overlay" style="background:#111;color:#fff;display:none;">
    <div style="font-size:3rem;margin-bottom:1rem;">📷</div>
    <p id="camera-error-msg" style="margin-bottom:1.25rem;font-size:1rem;">กล้องเปิดไม่ได้</p>
    <a href="/demo.html" class="btn-red" style="text-decoration:none;display:block;text-align:center;">เล่นโหมดง่ายแทน</a>
    <button id="retry-camera-btn" class="btn-white">ลองใหม่</button>
</div>

<!-- AR scene template — cloned into body on demand -->
<template id="ar-scene-template">
    <a-scene
        id="ar-scene"
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; maxTrack: 1; uiLoading: no; uiScanning: no; uiError: no;"
        color-space="sRGB"
        renderer="antialias: false; alpha: true; colorManagement: false; precision: mediump"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-assets timeout="60000"></a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-light type="ambient"     color="#fff" intensity="2.5"></a-light>
            <a-light type="directional" color="#fff" intensity="1"   position="1 2 1"></a-light>

            <!-- Elephant mascot group -->
            <a-entity id="elephant-mascot" position="0 0 0">

                <!-- Fallback: 3-part primitive elephant -->
                <a-entity id="elephant-fallback">
                    <!-- body -->
                    <a-sphere color="#DC2626" radius="0.1"  position="0    0.12 0"></a-sphere>
                    <!-- head -->
                    <a-sphere color="#EF4444" radius="0.07" position="0.1  0.21 0"></a-sphere>
                    <!-- trunk (tilted cylinder) -->
                    <a-cylinder color="#B91C1C" radius="0.022" height="0.11"
                                position="0.17 0.16 0" rotation="0 0 -30"></a-cylinder>
                    <!-- ear -->
                    <a-circle color="#FECACA" radius="0.05" position="-0.04 0.22 0.01"></a-circle>
                    <!-- tail -->
                    <a-cylinder color="#B91C1C" radius="0.015" height="0.09"
                                position="-0.1 0.12 0" rotation="0 0 30"></a-cylinder>
                </a-entity>

                <!-- GLB model (loaded after arReady) -->
                <a-gltf-model id="elephant-model" visible="false"
                              position="0 0.1 0" scale="0.14 0.14 0.14"></a-gltf-model>

                <!-- Small gold ring on ground plane -->
                <a-ring color="#FBBF24"
                        radius-inner="0.13" radius-outer="0.17"
                        position="0 0.005 0" rotation="-90 0 0"></a-ring>
            </a-entity>

            <!-- 3 lucky collect items — small coloured spheres -->
            <a-sphere class="lucky-item" color="#DC2626" radius="0.045"
                      position="-0.28 0.07 0.04"></a-sphere>
            <a-sphere class="lucky-item" color="#FBBF24" radius="0.04"
                      position=" 0.28 0.06 0.04"></a-sphere>
            <a-sphere class="lucky-item" color="#EF4444" radius="0.04"
                      position=" 0    0.27 0.04"></a-sphere>
        </a-entity>
    </a-scene>
</template>

<script>
window.GAME_CONFIG = {
    apiUrl:         '/api/collect-item',
    rewardUrl:      '/reward.html',
    itemsRequired:  3,
    initialCount:   0,
    elephantModel:  '/assets/models/red_elephant_mascot_3d.glb',
    needsHttps:     false,
    messages: {
        tapToCollect:        'แตะช้างเพื่อเก็บ!',
        alreadyCollected:    'เก็บแล้ว!',
        targetFound:         'พบช้างแล้ว! — แตะช้าง',
        scanHint:            'ชี้กล้องไปที่การ์ด MindAR',
        loadingAr:           'กำลังเปิดกล้อง AR...',
        cameraDenied:        'กล้องเปิดไม่ได้ — ตรวจสอบสิทธิ์ใน Settings',
        cameraHttpsRequired: 'ต้องใช้ HTTPS — ใช้ลิงก์ Vercel',
    }
};
</script>
<script src="/assets/js/game.js"></script>
</body>
</html>
